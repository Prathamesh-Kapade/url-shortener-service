
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener — Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8;
               min-height: 100vh; padding: 2rem 1rem; }
        .app { max-width: 520px; margin: 0 auto; }
        h1 { font-size: 1.75rem; font-weight: 700; color: #1e40af;
             text-align: center; margin-bottom: .25rem; }
        .subtitle { text-align: center; color: #64748b; font-size: .9rem;
                    margin-bottom: 2rem; }
        .card { background: #fff; border-radius: 16px;
                box-shadow: 0 4px 20px rgba(0,0,0,.08);
                padding: 1.75rem; margin-bottom: 1.25rem; }
        .card h2 { font-size: 1rem; font-weight: 600; color: #374151;
                   margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
        .dot { width: 8px; height: 8px; border-radius: 50%;
               background: #3b82f6; display: inline-block; }
        input { width: 100%; padding: .75rem 1rem; border: 1.5px solid #e2e8f0;
                border-radius: 10px; font-size: .9rem; margin-bottom: .75rem;
                transition: border-color .2s; outline: none; }
        input:focus { border-color: #3b82f6; }
        .btn { width: 100%; padding: .8rem; background: #2563eb; color: #fff;
               border: none; border-radius: 10px; font-size: .95rem;
               font-weight: 600; cursor: pointer; transition: background .2s; }
        .btn:hover { background: #1d4ed8; }
        .btn:disabled { background: #93c5fd; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1.5px solid #2563eb;
                       color: #2563eb; margin-top: .5rem; }
        .btn-outline:hover { background: #eff6ff; }
        .toggle { text-align: center; margin-top: .75rem; font-size: .85rem;
                  color: #64748b; }
        .toggle span { color: #2563eb; cursor: pointer; font-weight: 600; }
        .toggle span:hover { text-decoration: underline; }
        .result { background: #eff6ff; border: 1.5px solid #bfdbfe;
                  border-radius: 10px; padding: 1rem; margin-top: .75rem; }
        .result-url { font-weight: 700; color: #1d4ed8; word-break: break-all;
                      font-size: .9rem; }
        .copy-btn { margin-top: .5rem; padding: .4rem .9rem; background: #2563eb;
                    color: #fff; border: none; border-radius: 6px;
                    font-size: .8rem; cursor: pointer; }
        .copy-btn:hover { background: #1d4ed8; }
        .msg { padding: .65rem 1rem; border-radius: 8px; font-size: .85rem;
               margin-bottom: .75rem; }
        .msg.success { background: #d1fae5; color: #065f46; }
        .msg.error   { background: #fee2e2; color: #991b1b; }
        .badge { display: inline-block; padding: .2rem .6rem; background: #dbeafe;
                 color: #1e40af; border-radius: 99px; font-size: .75rem;
                 font-weight: 600; margin-left: .5rem; }
        .logged-in { display: flex; justify-content: space-between;
                     align-items: center; padding: .6rem 1rem;
                     background: #d1fae5; border-radius: 10px;
                     font-size: .85rem; color: #065f46; margin-bottom: 1rem; }
        .logout-btn { background: none; border: none; color: #dc2626;
                      cursor: pointer; font-size: .8rem; font-weight: 600; }
        .history { margin-top: 1rem; }
        .history-item { padding: .6rem; border: 1px solid #e2e8f0;
                        border-radius: 8px; margin-bottom: .4rem;
                        font-size: .82rem; color: #374151; display: flex;
                        justify-content: space-between; align-items: center; }
        .history-code { color: #2563eb; font-weight: 700; font-family: monospace; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="app">

    <h1>🔗 URL Shortener</h1>
    <p class="subtitle">Backend API Demo — Spring Boot + Redis + Kafka + JWT</p>

    <!-- LOGGED IN BAR -->
    <div id="loggedInBar" class="logged-in hidden">
        <span>Logged in as <strong id="loggedUser"></strong></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- AUTH CARD -->
    <div class="card" id="authCard">
        <h2><span class="dot"></span> <span id="authTitle">Login</span>
            <span class="badge" id="authBadge">Step 1</span></h2>
        <div id="authMsg"></div>
        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Password" />
        <button class="btn" id="authBtn" onclick="handleAuth()">Login</button>
        <div class="toggle">
            <span id="toggleText">Don't have an account?</span>
            <span onclick="toggleAuthMode()"> <span id="toggleAction">Register</span></span>
        </div>
    </div>

    <!-- SHORTEN CARD -->
    <div class="card hidden" id="shortenCard">
        <h2><span class="dot"></span> Shorten a URL
            <span class="badge">Step 2</span></h2>
        <div id="shortenMsg"></div>
        <input type="url" id="longUrl"
               placeholder="https://example.com/very-long-url" />
        <button class="btn" onclick="shortenUrl()">Shorten URL</button>

        <div id="result" class="hidden">
            <div class="result" style="margin-top:.75rem">
                <div style="font-size:.8rem;color:#64748b;margin-bottom:.3rem">
                    Your short URL:
                </div>
                <div class="result-url" id="shortUrlDisplay"></div>
                <div style="display:flex;gap:.5rem;margin-top:.5rem">
                    <button class="copy-btn" onclick="copyUrl()">Copy</button>
                    <button class="copy-btn" style="background:#10b981"
                            onclick="openUrl()">Open & Redirect</button>
                </div>
            </div>
        </div>

        <div class="history" id="history"></div>
    </div>

    <!-- LINKS CARD -->
    <div class="card" style="text-align:center">
        <p style="font-size:.85rem;color:#64748b;margin-bottom:.75rem">
            Explore the full API
        </p>
        <a href="/swagger-ui/index.html" target="_blank">
            <button class="btn btn-outline">Open Swagger UI (Full API Docs)</button>
        </a>
    </div>

</div>

<script>
    const API = window.location.origin;  // same origin — Spring Boot serves this file
    let token = localStorage.getItem('jwtToken');
    let isLogin = true;
    let history = [];
    let lastShortCode = '';

    window.onload = () => {
      if (token) showShortener();
    };

    function toggleAuthMode() {
      isLogin = !isLogin;
      document.getElementById('authTitle').textContent = isLogin ? 'Login' : 'Register';
      document.getElementById('authBtn').textContent   = isLogin ? 'Login' : 'Register';
      document.getElementById('toggleAction').textContent = isLogin ? 'Register' : 'Login';
      document.getElementById('toggleText').textContent =
        isLogin ? "Don't have an account?" : 'Already have an account?';
      document.getElementById('authMsg').innerHTML = '';
    }

    async function handleAuth() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      if (!u || !p) return showMsg('authMsg', 'Please fill all fields', 'error');

      const btn = document.getElementById('authBtn');
      btn.disabled = true; btn.textContent = 'Please wait...';

      try {
        if (!isLogin) {
          const r = await fetch(`${API}/api/auth/register`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username:u, password:p})
          });
          const d = await r.json();
          if (!r.ok) return showMsg('authMsg', d.error || 'Registration failed', 'error');
          showMsg('authMsg', 'Registered! Logging you in...', 'success');
          isLogin = true;
        }
        const r = await fetch(`${API}/api/auth/login`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({username:u, password:p})
        });
        const d = await r.json();
        if (!r.ok) return showMsg('authMsg', d.error || 'Login failed', 'error');
        token = d.token;
        localStorage.setItem('jwtToken', token);
        localStorage.setItem('jwtUser', u);
        showShortener(u);
      } catch(e) {
        showMsg('authMsg', 'Server error: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = isLogin ? 'Login' : 'Register';
      }
    }

    function showShortener(u) {
      const user = u || localStorage.getItem('jwtUser') || 'User';
      document.getElementById('authCard').classList.add('hidden');
      document.getElementById('shortenCard').classList.remove('hidden');
      document.getElementById('loggedInBar').classList.remove('hidden');
      document.getElementById('loggedUser').textContent = user;
    }

    async function shortenUrl() {
      const url = document.getElementById('longUrl').value.trim();
      if (!url) return showMsg('shortenMsg', 'Please enter a URL', 'error');

      try {
        const r = await fetch(`${API}/api/shorten`, {
          method:'POST',
          headers:{'Content-Type':'application/json',
                   'Authorization':'Bearer ' + token},
          body: JSON.stringify({originalUrl: url})
        });
        const d = await r.json();
        if (!r.ok) return showMsg('shortenMsg', d.error || 'Failed', 'error');

        lastShortCode = d.shortCode;
        document.getElementById('shortUrlDisplay').textContent = d.shortUrl;
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('longUrl').value = '';
        showMsg('shortenMsg', 'URL shortened successfully!', 'success');

        history.unshift({code: d.shortCode, url: d.shortUrl, original: url});
        renderHistory();
      } catch(e) {
        showMsg('shortenMsg', 'Server error: ' + e.message, 'error');
      }
    }

    function copyUrl() {
      const url = document.getElementById('shortUrlDisplay').textContent;
      navigator.clipboard.writeText(url);
      showMsg('shortenMsg', 'Copied to clipboard!', 'success');
    }

    function openUrl() {
      const url = document.getElementById('shortUrlDisplay').textContent;
      window.open(url, '_blank');
    }

    function renderHistory() {
      if (!history.length) return;
      const h = document.getElementById('history');
      h.innerHTML = '<div style="font-size:.8rem;color:#64748b;margin-bottom:.4rem">Recent URLs</div>'
        + history.slice(0,5).map(i => `
          <div class="history-item">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%"
                  title="${i.original}">${i.original}</span>
            <span class="history-code">${i.code}</span>
          </div>`).join('');
    }

    function logout() {
      localStorage.removeItem('jwtToken');
      localStorage.removeItem('jwtUser');
      token = null;
      document.getElementById('authCard').classList.remove('hidden');
      document.getElementById('shortenCard').classList.add('hidden');
      document.getElementById('loggedInBar').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('history').innerHTML = '';
      history = [];
    }

    function showMsg(id, msg, type) {
      const el = document.getElementById(id);
      el.innerHTML = `<div class="msg ${type}">${msg}</div>`;
      setTimeout(() => el.innerHTML = '', 4000);
    }
</script>
</body>
</html>
